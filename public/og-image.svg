<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f43f5e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#6366f1" opacity="0.08"/>
  <circle cx="1100" cy="530" r="250" fill="#8b5cf6" opacity="0.08"/>
  <circle cx="600" cy="315" r="400" fill="#4f46e5" opacity="0.04"/>

  <!-- Left player card -->
  <rect x="100" y="170" width="320" height="290" rx="24" fill="url(#cardGrad)" opacity="0.9"/>
  <!-- Avatar circle -->
  <circle cx="260" cy="245" r="48" fill="white" opacity="0.2"/>
  <text x="260" y="258" font-family="Arial, sans-serif" font-size="36" text-anchor="middle" fill="white">👤</text>
  <!-- Player name -->
  <text x="260" y="320" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="white">שחקן א'</text>
  <!-- Score -->
  <text x="260" y="360" font-family="Arial, sans-serif" font-size="48" font-weight="900" text-anchor="middle" fill="white">8</text>
  <text x="260" y="390" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="white" opacity="0.8">נקודות</text>
  <!-- Checkmarks -->
  <text x="260" y="430" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="white" opacity="0.9">✓ ✓ ✗ ✓ ✓</text>

  <!-- Right player card -->
  <rect x="780" y="170" width="320" height="290" rx="24" fill="url(#cardGrad2)" opacity="0.9"/>
  <circle cx="940" cy="245" r="48" fill="white" opacity="0.2"/>
  <text x="940" y="258" font-family="Arial, sans-serif" font-size="36" text-anchor="middle" fill="white">👤</text>
  <text x="940" y="320" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="white">שחקן ב'</text>
  <text x="940" y="360" font-family="Arial, sans-serif" font-size="48" font-weight="900" text-anchor="middle" fill="white">7</text>
  <text x="940" y="390" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="white" opacity="0.8">נקודות</text>
  <text x="940" y="430" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="white" opacity="0.9">✓ ✗ ✓ ✓ ✓</text>

  <!-- Center VS / heart area -->
  <circle cx="600" cy="280" r="60" fill="#4f46e5" opacity="0.4"/>
  <circle cx="600" cy="280" r="44" fill="#6366f1"/>
  <text x="600" y="294" font-family="Arial, sans-serif" font-size="40" text-anchor="middle" fill="white">♥</text>

  <!-- Connection lines -->
  <line x1="420" y1="280" x2="556" y2="280" stroke="white" stroke-width="2" stroke-dasharray="8,6" opacity="0.3"/>
  <line x1="644" y1="280" x2="780" y2="280" stroke="white" stroke-width="2" stroke-dasharray="8,6" opacity="0.3"/>

  <!-- Main title -->
  <text x="600" y="100" font-family="Arial, sans-serif" font-size="64" font-weight="900" text-anchor="middle" fill="white" filter="url(#glow)">מכירים אותי?</text>

  <!-- Subtitle -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="26" text-anchor="middle" fill="#a5b4fc">משחק אמת לשניים — כמה באמת אתם מכירים אחד את השני?</text>

  <!-- Bottom URL hint -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#6366f1" opacity="0.7">doyouknowme.vercel.app</text>
</svg>
